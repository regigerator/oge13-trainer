<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OGE RAID — тренажёр задания №13</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">13</div>
          <div>
            <p class="eyebrow">OGE RAID</p>
            <h1>Миссия №13: неравенства</h1>
          </div>
        </div>

        <div class="topbar-controls">
          <button class="ghost-button" type="button" data-action="reset-progress">Сбросить рейд</button>
        </div>
      </header>

      <section class="status-strip" aria-label="Прогресс">
        <div>
          <span class="status-label">Прогресс</span>
          <strong id="progressText">0 / 0</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div>
          <span class="status-label">Режим</span>
          <strong>спокойная тренировка</strong>
        </div>
      </section>

      <div class="workspace">
        <aside class="sidebar" aria-label="Блоки тренажёра">
          <div class="sidebar-head">
            <span class="status-label">Лестница</span>
            <strong>от прямой к системе</strong>
          </div>
          <nav id="blockNav" class="block-nav"></nav>
        </aside>

        <main id="taskArea" class="task-area" tabindex="-1"></main>
      </div>
    </div>

    <script src="tasks.js"></script>
    <script src="app.js"></script>
  </body>
</html>
